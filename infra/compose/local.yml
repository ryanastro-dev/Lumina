services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lumina-qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ../../.qdrant:/qdrant/storage

  postgres:
    image: postgres:18-alpine
    container_name: lumina-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lumina
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: lumina_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumina -d lumina"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "5432:5432"
    volumes:
      - ../../.postgres18:/var/lib/postgresql

