services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lumina-qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./.qdrant:/qdrant/storage

  postgres:
    image: postgres:18-alpine
    container_name: lumina-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lumina}
      POSTGRES_USER: ${POSTGRES_USER:-lumina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumina_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lumina} -d ${POSTGRES_DB:-lumina}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "5432:5432"
    volumes:
      - ./.postgres18:/var/lib/postgresql

  lumina-engine:
    build:
      context: ./apps/lumina-engine
      dockerfile: Dockerfile
    container_name: lumina-engine
    restart: unless-stopped
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-lumina_documents}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L12-v2}
      CHUNK_SIZE: ${CHUNK_SIZE:-240}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-60}
      SIMILARITY_THRESHOLD: ${SIMILARITY_THRESHOLD:-0.80}
      TOP_K: ${TOP_K:-5}
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    ports:
      - "${LUMINA_ENGINE_PORT:-8000}:8000"

  lumina-api:
    build:
      context: ./apps/lumina-api
      dockerfile: Dockerfile
    container_name: lumina-api
    restart: unless-stopped
    environment:
      PORT: 8080
      LUMINA_ENGINE_BASE_URL: http://lumina-engine:8000
      LUMINA_ENGINE_TIMEOUT_SECONDS: ${LUMINA_ENGINE_TIMEOUT_SECONDS:-120}
      LUMINA_JOB_RETENTION_HOURS: ${LUMINA_JOB_RETENTION_HOURS:-168}
      LUMINA_JOB_CLEANUP_INTERVAL_MINUTES: ${LUMINA_JOB_CLEANUP_INTERVAL_MINUTES:-60}
      LUMINA_DB_MAX_OPEN_CONNS: ${LUMINA_DB_MAX_OPEN_CONNS:-25}
      LUMINA_DB_MAX_IDLE_CONNS: ${LUMINA_DB_MAX_IDLE_CONNS:-10}
      LUMINA_DB_CONN_MAX_LIFETIME_MINUTES: ${LUMINA_DB_CONN_MAX_LIFETIME_MINUTES:-5}
      LUMINA_API_KEY: ${LUMINA_API_KEY:-}
      POSTGRES_DSN: postgres://${POSTGRES_USER:-lumina}:${POSTGRES_PASSWORD:-lumina_dev}@postgres:5432/${POSTGRES_DB:-lumina}?sslmode=disable
    depends_on:
      lumina-engine:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "${GATEWAY_PORT:-8080}:8080"

  lumina-web:
    build:
      context: ./apps/lumina-web
      dockerfile: Dockerfile
    container_name: lumina-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      LUMINA_GATEWAY_BASE_URL: http://lumina-api:8080
      LUMINA_GATEWAY_API_KEY: ${LUMINA_API_KEY:-}
      NEXT_PUBLIC_GATEWAY_BASE_URL: http://localhost:${GATEWAY_PORT:-8080}
    depends_on:
      lumina-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    ports:
      - "${WEB_PORT:-3000}:3000"


